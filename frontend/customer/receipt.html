<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartPay — Payment Receipt</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    body {
      background: #f4f6fb;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      font-family: var(--font-body);
    }

    :root {
      --c-ink: #111827; --c-ink2: #374151; --c-muted: #9ca3af;
      --c-border: #e5e7eb; --c-card: #fff; --c-green: #059669;
      --c-green-bg: #ecfdf5; --c-blue: #2563eb;
    }

    .wrap { width: 100%; max-width: 420px; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .receipt-card {
      background: var(--c-card);
      border-radius: 24px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      overflow: hidden;
      border: 1px solid var(--c-border);
    }

    /* Status header */
    .status-hd {
      padding: 36px 28px 28px;
      text-align: center;
      position: relative;
    }
    .status-hd.success { background: var(--c-green-bg); }
    .status-hd.failed { background: #fef2f2; }
    .status-hd.pending { background: #fffbeb; }

    .status-ring {
      width: 72px; height: 72px; border-radius: 50%;
      margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
    .success .status-ring { background: #d1fae5; border: 2px solid #6ee7b7; }
    .failed .status-ring { background: #fee2e2; border: 2px solid #fca5a5; }
    .pending .status-ring { background: #fef3c7; border: 2px solid #fcd34d; }

    .status-title { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--c-ink); margin-bottom: 4px; }
    .status-sub { font-size: 13px; color: var(--c-muted); }

    /* Amount */
    .amount-row {
      display: flex; align-items: center; justify-content: center;
      background: var(--c-ink); color: #fff;
      padding: 20px; gap: 8px;
    }
    .amt-label { font-size: 13px; opacity: 0.5; }
    .amt-value { font-family: var(--font-head); font-size: 28px; font-weight: 800; letter-spacing: -1px; }

    /* Details */
    .details { padding: 20px 24px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--c-border); font-size: 13px; }
    .detail-row:last-child { border-bottom: none; }
    .dk { color: var(--c-muted); font-weight: 600; }
    .dv { font-weight: 600; color: var(--c-ink2); text-align: right; font-family: monospace; font-size: 12px; max-width: 60%; word-break: break-all; }

    /* Actions */
    .actions { padding: 0 24px 24px; display: flex; gap: 10px; flex-direction: column; }
    .print-btn { width: 100%; padding: 13px; border: 1.5px solid var(--c-border); border-radius: 12px; background: transparent; font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--c-ink2); cursor: pointer; transition: all 0.15s; }
    .print-btn:hover { border-color: var(--c-blue); color: var(--c-blue); }
    .retry-btn { width: 100%; padding: 13px; border-radius: 12px; background: var(--c-blue); border: none; font-family: var(--font-head); font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.15s; }
    .retry-btn:hover { background: #1d4ed8; }

    /* Footer */
    .receipt-foot { padding: 14px 24px 18px; border-top: 1px solid var(--c-border); text-align: center; font-size: 11px; color: var(--c-muted); }

    @media print {
      body { background: #fff; }
      .actions { display: none; }
      .receipt-card { box-shadow: none; border: 1px solid #ddd; }
    }

    @media (max-width: 480px) {
      .amt-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="receipt-card">

    <div class="status-hd" id="statusHd">
      <div class="status-ring" id="statusRing">⏳</div>
      <div class="status-title" id="statusTitle">Checking payment...</div>
      <div class="status-sub" id="statusSub">Please wait</div>
    </div>

    <div class="amount-row">
      <span class="amt-label">Amount</span>
      <span class="amt-value" id="receiptAmount">—</span>
    </div>

    <div class="details" id="receiptDetails"></div>

    <div class="actions" id="receiptActions"></div>

    <div class="receipt-foot">
      Secured by <strong>Cashfree Payments</strong> · 256-bit TLS encryption
    </div>

  </div>
</div>

<script src="../assets/config.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order_id');
  const orderStatus = params.get('order_status');

  async function init() {
    if (!orderId) {
      showState('failed', '❌', 'Invalid Link', 'No order ID found in URL.');
      return;
    }

    try {
      // Verify with backend first
      if (orderStatus) {
        await fetch(`${CONFIG.API_URL}/payments/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId }),
        });
      }

      const res = await fetch(`${CONFIG.API_URL}/payments/status/${orderId}`);
      const data = await res.json();
      const o = data.order;

      document.getElementById('receiptAmount').textContent = Utils.fmt(o.amount);

      const details = [
        ['Order ID', o.id],
        ['Customer', o.customer_name],
        ['Email', o.customer_email],
        ['Phone', o.customer_phone],
        ['Description', o.description || '—'],
        ['Date', new Date(o.created_at).toLocaleString('en-IN')],
        ...(o.cf_payment_id ? [['CF Payment ID', o.cf_payment_id]] : []),
        ...(o.payment_method ? [['Method', o.payment_method]] : []),
      ];

      document.getElementById('receiptDetails').innerHTML = details.map(([k, v]) =>
        `<div class="detail-row"><span class="dk">${k}</span><span class="dv">${v}</span></div>`
      ).join('');

      if (o.status === 'PAID') {
        showState('success', '✓', 'Payment Successful!', `Thank you, ${o.customer_name.split(' ')[0]}! Your payment has been received.`);
        document.getElementById('receiptActions').innerHTML = `
          <button class="print-btn" onclick="window.print()">🖨 Print Receipt</button>`;
      } else if (['FAILED', 'DROPPED'].includes(o.status)) {
        showState('failed', '✕', 'Payment Failed', o.error_reason || 'Your payment could not be processed.');
        document.getElementById('receiptActions').innerHTML = `
          <button class="retry-btn" onclick="window.history.back()">↩ Try Again</button>`;
      } else {
        showState('pending', '⏳', 'Payment Pending', 'Your payment is being processed. Please wait.');
        document.getElementById('receiptActions').innerHTML = `
          <button class="print-btn" onclick="location.reload()">↻ Refresh Status</button>`;
      }

    } catch (e) {
      showState('failed', '⚠', 'Could Not Load', 'Unable to fetch payment details.');
    }
  }

  function showState(type, icon, title, sub) {
    const hd = document.getElementById('statusHd');
    hd.className = `status-hd ${type}`;
    document.getElementById('statusRing').textContent = icon;
    document.getElementById('statusTitle').textContent = title;
    document.getElementById('statusSub').textContent = sub;
  }

  init();
</script>
</body>
</html>
